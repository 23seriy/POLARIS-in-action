# Violates: readinessProbeMissing + livenessProbeMissing (reliability)
# Polaris flags this because the container has no health checks configured.
apiVersion: v1
kind: Pod
metadata:
  name: bench-warmer-no-probes
  namespace: polaris-demo
  labels:
    app: bench-warmer
    scenario: no-probes
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
  containers:
    - name: bench-warmer
      image: bench-warmer:v1
      imagePullPolicy: Always
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      # No readinessProbe → Polaris warning: readinessProbeMissing
      # No livenessProbe  → Polaris warning: livenessProbeMissing
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 10001
        capabilities:
          drop: ["ALL"]
