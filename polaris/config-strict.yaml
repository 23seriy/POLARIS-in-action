# Strict Polaris configuration — production-hardened mode.
# Promotes all warnings to danger so the webhook rejects them outright.
# Use this config for the "Full Lockdown" demo scenario.

checks:
  # -- Security (all danger) --
  hostIPCSet: danger
  hostPIDSet: danger
  hostNetworkSet: danger
  hostPortSet: danger
  runAsRootAllowed: danger
  runAsPrivileged: danger
  privilegeEscalationAllowed: danger
  notReadOnlyRootFilesystem: danger
  insecureCapabilities: danger
  dangerousCapabilities: danger
  automountServiceAccountToken: danger
  linuxHardening: danger

  # -- Efficiency (all danger) --
  cpuRequestsMissing: danger
  cpuLimitsMissing: danger
  memoryRequestsMissing: danger
  memoryLimitsMissing: danger

  # -- Reliability (all danger) --
  readinessProbeMissing: danger
  livenessProbeMissing: danger
  tagNotSpecified: danger
  pullPolicyNotAlways: danger
  priorityClassNotSet: warning
  deploymentMissingReplicas: danger
  missingPodDisruptionBudget: warning
  topologySpreadConstraint: ignore

  # -- Custom checks --
  teamLabelRequired: danger

customChecks:
  teamLabelRequired:
    successMessage: Pod has the required 'team' label
    failureMessage: Pod is missing the required 'team' label
    category: Reliability
    target: Pod
    schema:
      '$schema': http://json-schema.org/draft-07/schema
      type: object
      required: ["metadata"]
      properties:
        metadata:
          type: object
          required: ["labels"]
          properties:
            labels:
              type: object
              required: ["team"]
              properties:
                team:
                  type: string
                  minLength: 1

exemptions:
  - namespace: kube-system
  - namespace: polaris
  - namespace: cert-manager
