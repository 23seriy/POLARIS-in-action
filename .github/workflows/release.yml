name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Extract changelog section
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # Pass VERSION as an awk variable to avoid shell interpolation into the program text
          NOTES=$(awk -v ver="$VERSION" 'BEGIN{found=0} $0 == "## [" ver "]" || $0 ~ "^## \\[" ver "\\]"{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}. See CHANGELOG.md for details."
          fi

          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "$RELEASE_NOTES"
