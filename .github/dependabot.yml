version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "[ci] "
      prefix-development: "[ci] "

  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/apps/game-day-api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "[deps] "

  - package-ecosystem: "pip"
    directory: "/apps/bench-warmer"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "[deps] "

  - package-ecosystem: "docker"
    directory: "/apps/game-day-api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "[deps] "

  - package-ecosystem: "docker"
    directory: "/apps/bench-warmer"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "[deps] "
